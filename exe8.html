<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Card</title>
  <style>
    .card {
      width: 250px;
      padding: 20px;
      margin: 20px;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-family: Arial, sans-serif;
    }

    .card h2 {
      margin-top: 0;
    }

    .card button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background-color: #0056b3;
    }

    body {
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Título do Card</h2>
    <p>Este é um parágrafo dentro do card. O conteúdo não encosta nas bordas por causa do padding.</p>
    <button>Clique aqui</button>
  </div>

</body>
</html>
