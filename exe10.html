<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>3 Cards</title>
<style>
  .container {
    display: flex;
    justify-content: space-between;
  }

  .card {
    width: 30%;
    padding: 20px;
    margin: 10px;
    background-color: #fff;
    border: 1px solid #ccc;
    box-sizing: border-box; /* ESSENCIAL */
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h3>Título 1</h3>
    <p>Texto do card 1</p>
  </div>

  <div class="card">
    <h3>Título 2</h3>
    <p>Texto do card 2</p>
  </div>

  <div class="card">
    <h3>Título 3</h3>
    <p>Texto do card 3</p>
  </div>
</div>

</body>
</html>
